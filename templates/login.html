<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XStore | Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-container">
        <h1>XSTORE</h1>
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-login">Ingresar al Catálogo</button>
        </form>

        <div class="intentos">Intentos restantes: <strong>{{ restantes }}</strong></div>
    </div>

</body>
</html>
